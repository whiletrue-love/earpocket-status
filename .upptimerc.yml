  - name: RSS Feeds
    url: https://feeds.earpocket.com
  - name: CDN
    url: https://cdn.earpocket.com
  - name: Widget
    url: https://widget.earpocket.com
  - name: Website
    url: https://www.earpocket.com

status-website:
