owner: whiletrue-love
repo: earpocket-status
user-agent: whiletrue-love

sites:
  - name: API
    url: https://api.earpocket.com/health
    maxResponseTime: 5000
  - name: RSS Feeds
    url: https://feeds.earpocket.com/health
  - name: CDN
    url: https://cdn.earpocket.com
    expectedStatusCodes:
      - 200
      - 404
  - name: Widget
    url: https://widget.earpocket.com
    expectedStatusCodes:
      - 200
      - 404
  - name: Website
    url: https://earpocket.com

status-website:
  cname: status.earpocket.com
  logoUrl: https://status.earpocket.com/logo.svg
  name: Earpocket Status
  theme: dark
  introTitle: "**Earpocket** service status"
  introMessage: Real-time availability and incident history for all Earpocket services.
  navbar:
    - title: Status
      href: /
    - title: Earpocket
      href: https://earpocket.com
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  customHeadHtml: '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">'
  css: |
    :root {
      --body-background-color: #1a1a1a;
      --body-text-color: #f0f0f0;
      --card-background-color: #262626;
      --nav-background-color: #262626;
      --nav-border-bottom-color: #404040;
    }
    body, button, input, select, textarea {
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    h1, h2, h3 {
      font-family: 'Instrument Serif', Georgia, serif;
    }
    a { color: #0ea5e9; }
    a:hover { color: #38bdf8; }
