owner: whiletrue-love
repo: earpocket-status
user-agent: whiletrue-love

sites:
  - name: API
    url: https://api.earpocket.com/health
    icon: https://earpocket.com/logo.svg
    maxResponseTime: 5000
  - name: RSS Feeds
    url: https://feeds.earpocket.com/health
    icon: https://earpocket.com/logo.svg
  - name: CDN
    url: https://cdn.earpocket.com
    icon: https://earpocket.com/logo.svg
    expectedStatusCodes:
      - 200
      - 404
  - name: Widget
    url: https://widget.earpocket.com
    icon: https://earpocket.com/logo.svg
    expectedStatusCodes:
      - 200
      - 404
  - name: Website
    url: https://earpocket.com
    icon: https://earpocket.com/logo.svg

status-website:
  cname: status.earpocket.com
  logoUrl: https://earpocket.com/logo.svg
  faviconSvg: https://earpocket.com/logo.svg
  name: Earpocket Status
  theme: dark
  introTitle: "**Earpocket** service status"
  introMessage: Keeping tabs on everything, so you don't have to.
  navbar:
    - title: Status
      href: /
    - title: Earpocket
      href: https://earpocket.com
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  customHeadHtml: '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">'
  css: |
    :root {
      --body-background-color: #1a1a1a;
      --body-text-color: #f0f0f0;
      --card-background-color: #262626;
      --nav-background-color: #262626;
      --nav-border-bottom-color: #404040;
      --nav-current-border-bottom-color: #0ea5e9;
      --card-border-color: #404040;
      --up-border-left-color: #22c55e;
      --down-border-left-color: #ef4444;
      --down-background-color: rgba(239, 68, 68, 0.15);
      --degraded-border-left-color: #f59e0b;
      --tag-color: #262626;
      --tag-up-background-color: #22c55e;
      --tag-down-background-color: #ef4444;
      --tag-degraded-background-color: #f59e0b;
      --change-background-color: #f59e0b;
      --error-button-background-color: #0ea5e9;
      --error-button-border-color: #0284c7;
      --error-button-color: #ffffff;
      --submit-button-background-color: #0ea5e9;
      --submit-button-border-color: #0284c7;
      --submit-button-color: #ffffff;
    }
    body, button, input, select, textarea {
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    h1, h2, h3 {
      font-family: 'Instrument Serif', Georgia, serif;
    }
    code, pre, .monospace {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    a {
      color: #0ea5e9;
      transition: color 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    a:hover { color: #38bdf8; }
    a:focus-visible {
      outline: 2px solid #0ea5e9;
      outline-offset: 2px;
    }
    button {
      border-radius: 8px;
      transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    ::selection {
      background: #0ea5e9;
      color: #ffffff;
    }
